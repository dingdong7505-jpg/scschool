  <style>
    * { font-family: 'Noto Sans KR', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #f8fafc; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    input, select, textarea { outline: none; }
    .status-출석 { background:#dcfce7; color:#16a34a; }
    .status-결석 { background:#fee2e2; color:#dc2626; }
    .status-조퇴 { background:#fef9c3; color:#ca8a04; }
    .status-공결 { background:#dbeafe; color:#2563eb; }
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .safe-area-pb { padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); }
    }
